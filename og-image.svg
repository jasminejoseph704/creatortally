<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0F0F0F"/>
  
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E"/>
      <stop offset="100%" style="stop-color:#16A34A"/>
    </linearGradient>
  </defs>
  
  <!-- Logo mark - Tally 5 -->
  <g transform="translate(80, 80)">
    <rect width="80" height="80" rx="16" fill="url(#grad)"/>
    <line x1="25" y1="20" x2="25" y2="60" stroke="#0F0F0F" stroke-width="5" stroke-linecap="round"/>
    <line x1="40" y1="20" x2="40" y2="60" stroke="#0F0F0F" stroke-width="5" stroke-linecap="round"/>
    <line x1="55" y1="20" x2="55" y2="60" stroke="#0F0F0F" stroke-width="5" stroke-linecap="round"/>
    <line x1="15" y1="60" x2="65" y2="20" stroke="#0F0F0F" stroke-width="5" stroke-linecap="round"/>
  </g>
  
  <!-- Brand Name -->
  <text x="180" y="135" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#FFFFFF">Creator Tally</text>
  
  <!-- Headline -->
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Every dollar tracked.</text>
  <text x="600" y="360" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#22C55E" text-anchor="middle">Zero confusion.</text>
  
  <!-- Subtext -->
  <text x="600" y="440" font-family="Arial, sans-serif" font-size="28" fill="#8B8B8B" text-anchor="middle">Financial clarity for content creators</text>
  
  <!-- Decorative elements -->
  <circle cx="950" cy="500" r="80" fill="rgba(34, 197, 94, 0.15)"/>
  <circle cx="1050" cy="450" r="50" fill="rgba(59, 130, 246, 0.15)"/>
  <circle cx="1100" cy="550" r="30" fill="rgba(168, 85, 247, 0.15)"/>
</svg>