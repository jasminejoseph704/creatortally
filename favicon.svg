<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E"/>
      <stop offset="100%" style="stop-color:#16A34A"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#grad)"/>
  <!-- Tally marks - 4 vertical lines -->
  <line x1="10" y1="8" x2="10" y2="24" stroke="#0F0F0F" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="15" y1="8" x2="15" y2="24" stroke="#0F0F0F" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="8" x2="20" y2="24" stroke="#0F0F0F" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Diagonal strike-through for "5" tally -->
  <line x1="7" y1="24" x2="23" y2="8" stroke="#0F0F0F" stroke-width="2.5" stroke-linecap="round"/>
</svg>